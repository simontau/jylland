<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorforeningen Elcos – PR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }

    #counter {
      position: fixed;
      bottom: 16px;
      right: 20px;
      color: rgba(255,255,255,0.35);
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    #left-zone, #right-zone {
      position: fixed;
      top: 0;
      width: 50%;
      height: 100%;
      cursor: none;
    }
    #left-zone  { left: 0; }
    #right-zone { right: 0; }
  </style>
</head>
<body>
  <div id="loading">Indlæser…</div>
  <div id="canvas-wrap" style="display:none">
    <canvas id="slide"></canvas>
  </div>
  <div id="counter"></div>
  <div id="left-zone"></div>
  <div id="right-zone"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdf = null;
    let current = 1;
    let rendering = false;

    const canvas  = document.getElementById('slide');
    const ctx     = canvas.getContext('2d');
    const counter = document.getElementById('counter');
    const loading = document.getElementById('loading');
    const wrap    = document.getElementById('canvas-wrap');

    pdfjsLib.getDocument('../assets/PR.pdf').promise.then(doc => {
      pdf = doc;
      loading.style.display = 'none';
      wrap.style.display = 'flex';
      render(1);
    });

    function render(n) {
      if (!pdf || rendering) return;
      n = Math.max(1, Math.min(pdf.numPages, n));
      rendering = true;
      current = n;

      pdf.getPage(n).then(page => {
        const vp = page.getViewport({ scale: 1 });
        const scale = Math.min(window.innerWidth / vp.width, window.innerHeight / vp.height);
        const viewport = page.getViewport({ scale });

        canvas.width  = viewport.width;
        canvas.height = viewport.height;

        page.render({ canvasContext: ctx, viewport }).promise.then(() => {
          counter.textContent = `${current} / ${pdf.numPages}`;
          rendering = false;
        });
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') render(current + 1);
      if (e.key === 'ArrowLeft')                   render(current - 1);
      if (e.key === 'Escape')                      history.back();
    });

    document.getElementById('right-zone').addEventListener('click', () => render(current + 1));
    document.getElementById('left-zone').addEventListener('click',  () => render(current - 1));

    window.addEventListener('resize', () => render(current));
  </script>
</body>
</html>
